name: Lacework SAST/SCA Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  lacework-sast-sca:
    name: Lacework SAST/SCA Analysis
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Lacework SCA Scanner
      env:
        LW_ACCOUNT_NAME: ${{ secrets.LW_ACCOUNT_NAME }}
        LW_ACCESS_TOKEN: ${{ secrets.LW_ACCESS_TOKEN }}
      run: |
        echo "Running Lacework SCA (Software Composition Analysis) scan..."
        docker run --rm \
          -v "${PWD}:/src" \
          -e LW_ACCOUNT_NAME \
          -e LW_ACCESS_TOKEN \
          lacework/lacework-scanner:latest \
          sca scan /src \
          --json \
          --save-results \
          --output-file /src/lacework-sca-results.json

    - name: Run Lacework SAST Scanner
      env:
        LW_ACCOUNT_NAME: ${{ secrets.LW_ACCOUNT_NAME }}
        LW_ACCESS_TOKEN: ${{ secrets.LW_ACCESS_TOKEN }}
      run: |
        echo "Running Lacework SAST (Static Application Security Testing) scan..."
        docker run --rm \
          -v "${PWD}:/src" \
          -e LW_ACCOUNT_NAME \
          -e LW_ACCESS_TOKEN \
          lacework/lacework-scanner:latest \
          sast scan /src \
          --json \
          --save-results \
          --output-file /src/lacework-sast-results.json

    - name: Process Lacework Results
      if: always()
      run: |
        echo "Processing Lacework scan results..."
        
        # Check if results files exist
        if [ -f lacework-sca-results.json ]; then
          echo "SCA scan completed successfully"
          SCA_ISSUES=$(jq '.vulnerabilities | length' lacework-sca-results.json 2>/dev/null || echo "0")
          echo "Found $SCA_ISSUES SCA vulnerabilities"
        fi
        
        if [ -f lacework-sast-results.json ]; then
          echo "SAST scan completed successfully"
          SAST_ISSUES=$(jq '.findings | length' lacework-sast-results.json 2>/dev/null || echo "0")
          echo "Found $SAST_ISSUES SAST findings"
        fi

    - name: Convert to SARIF format
      if: always()
      run: |
        # Create SARIF output for GitHub Security tab integration
        cat > lacework-results.sarif << 'EOF'
        {
          "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
          "version": "2.1.0",
          "runs": [
            {
              "tool": {
                "driver": {
                  "name": "Lacework",
                  "informationUri": "https://www.lacework.com/",
                  "version": "latest"
                }
              },
              "results": []
            }
          ]
        }
        EOF
        
        # Merge SCA and SAST results if they exist
        if [ -f lacework-sca-results.json ] || [ -f lacework-sast-results.json ]; then
          echo "Converting Lacework results to SARIF format..."
          # Note: This is a simplified conversion - in practice, you'd need proper SARIF conversion
          # based on Lacework's actual JSON output format
        fi

    - name: Upload Lacework results to GitHub Security
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: lacework-results.sarif
      continue-on-error: true

    - name: Check for critical vulnerabilities
      run: |
        CRITICAL_COUNT=0
        
        # Check SCA results for critical vulnerabilities
        if [ -f lacework-sca-results.json ]; then
          CRITICAL_SCA=$(jq '[.vulnerabilities[] | select(.severity == "CRITICAL")] | length' lacework-sca-results.json 2>/dev/null || echo "0")
          echo "Critical SCA vulnerabilities: $CRITICAL_SCA"
          CRITICAL_COUNT=$((CRITICAL_COUNT + CRITICAL_SCA))
        fi
        
        # Check SAST results for high severity findings
        if [ -f lacework-sast-results.json ]; then
          HIGH_SAST=$(jq '[.findings[] | select(.severity == "HIGH" or .severity == "CRITICAL")] | length' lacework-sast-results.json 2>/dev/null || echo "0")
          echo "High/Critical SAST findings: $HIGH_SAST"
          CRITICAL_COUNT=$((CRITICAL_COUNT + HIGH_SAST))
        fi
        
        echo "Total critical issues found: $CRITICAL_COUNT"
        
        if [ "$CRITICAL_COUNT" -gt 0 ]; then
          echo "::error::Found $CRITICAL_COUNT critical security issues"
          echo "::notice::Please review the security findings and address critical vulnerabilities before merging"
          exit 1
        else
          echo "::notice::No critical security issues found"
        fi

    - name: Generate Security Report
      if: always()
      run: |
        echo "# Lacework Security Scan Report" > security-report.md
        echo "Generated on: $(date)" >> security-report.md
        echo "" >> security-report.md
        
        if [ -f lacework-sca-results.json ]; then
          echo "## Software Composition Analysis (SCA) Results" >> security-report.md
          SCA_TOTAL=$(jq '.vulnerabilities | length' lacework-sca-results.json 2>/dev/null || echo "0")
          echo "- Total vulnerabilities found: $SCA_TOTAL" >> security-report.md
          echo "" >> security-report.md
        fi
        
        if [ -f lacework-sast-results.json ]; then
          echo "## Static Application Security Testing (SAST) Results" >> security-report.md
          SAST_TOTAL=$(jq '.findings | length' lacework-sast-results.json 2>/dev/null || echo "0")
          echo "- Total findings: $SAST_TOTAL" >> security-report.md
          echo "" >> security-report.md
        fi
        
        echo "## Recommendations" >> security-report.md
        echo "1. Review all findings in the Lacework console" >> security-report.md
        echo "2. Prioritize fixing critical and high severity issues" >> security-report.md
        echo "3. Update dependencies to latest secure versions" >> security-report.md

    - name: Upload scan artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lacework-security-scan-results
        path: |
          lacework-sca-results.json
          lacework-sast-results.json
          lacework-results.sarif
          security-report.md
        retention-days: 30

    - name: Comment PR with results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          let comment = '## 🔒 Lacework Security Scan Results\n\n';
          
          try {
            if (fs.existsSync('security-report.md')) {
              const report = fs.readFileSync('security-report.md', 'utf8');
              comment += report;
            } else {
              comment += 'Security scan completed. Check the workflow logs for details.\n';
            }
            
            comment += '\n---\n*View detailed results in the [Security tab](../../security/code-scanning)*';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('Could not create PR comment:', error.message);
          }
