on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  LW_ACCOUNT_NAME: ${{ secrets.LW_ACCOUNT_NAME }}
  LW_API_KEY: ${{ secrets.LW_API_KEY }}
  LW_API_SECRET: ${{ secrets.LW_API_SECRET }}

name: Lacework Code Security

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    name: Run analysis
    outputs:
      has-critical: ${{ steps.check.outputs.has-critical }}
      count: ${{ steps.check.outputs.count }}
      cve-table: ${{ steps.check.outputs.cve-table }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Analyze
        uses: lacework/code-security-action@v1
        with:
          target: new
      - name: Download results artifact
        uses: actions/download-artifact@v4
        with:
          name: results-new
          path: lw-results
      - name: Check for critical CVEs
        id: check
        run: |
          RESULTS=$(find lw-results -type f | head -1)
          echo "Parsing: $RESULTS"

          # Extract critical findings — handles SARIF and common Lacework JSON formats
          FINDINGS=$(jq -c '
            if .runs? then
              [.runs[].results[] |
                select(
                  .level == "error" or
                  ((.properties?.severity? // .properties?.["security-severity"]?) | ascii_downcase? == "critical")
                ) | {
                  cve:  (.ruleId // "N/A"),
                  file: (.locations[0]?.physicalLocation?.artifactLocation?.uri // "N/A")
                }
              ]
            elif type == "array" then
              [.[] |
                select((.severity? | ascii_downcase?) == "critical") | {
                  cve:  (.cve_id // .cve // .id // "N/A"),
                  file: (.file_path // .path // .location // "N/A")
                }
              ]
            else [] end
          ' "$RESULTS" 2>/dev/null || echo "[]")

          COUNT=$(echo "$FINDINGS" | jq 'length')
          echo "Critical CVEs found: $COUNT"

          if [ "$COUNT" -gt "0" ]; then
            TABLE=$(echo "$FINDINGS" | jq -r '
              "| CVE ID | File |\n|---|---|\n" +
              (map("| \(.cve) | `\(.file)` |") | join("\n"))
            ')
            echo "has-critical=true" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "cve-table=$(echo "$TABLE" | base64 -w 0)" >> $GITHUB_OUTPUT
          fi

  open-issue-on-critical:
    runs-on: ubuntu-latest
    name: Open issue for critical CVEs
    needs:
      - run-analysis
    if: always() && needs.run-analysis.outputs.has-critical == 'true'
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        env:
          CVE_TABLE_B64: ${{ needs.run-analysis.outputs.cve-table }}
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const count = '${{ needs.run-analysis.outputs.count }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const table = Buffer.from(process.env.CVE_TABLE_B64, 'base64').toString('utf-8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] ${count} Critical CVE(s) detected in ${sha}`,
              body: [
                '## Critical CVEs Detected',
                '',
                `**${count} critical CVE(s)** were identified by Lacework in commit \`${context.sha}\`.`,
                '',
                table,
                '',
                `**Workflow run:** ${runUrl}`,
                '',
                'Please review and remediate.',
              ].join('\n'),
            });
