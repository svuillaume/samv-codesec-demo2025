on:
  - pull_request
  - workflow_dispatch

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  LW_ACCOUNT_NAME: ${{ secrets.LW_ACCOUNT_NAME }}
  LW_API_KEY: ${{ secrets.LW_API_KEY }}
  LW_API_SECRET: ${{ secrets.LW_API_SECRET }}

name: Lacework Code Security (PR)
jobs:
  run-analysis:
    runs-on: ubuntu-latest
    name: Run analysis
    strategy:
      matrix:
        target: [new, old]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: Checkout old
        if: ${{ matrix.target == 'old' }}
        run: git checkout HEAD^1
      - name: Analyze
        uses: lacework/code-security-action@v1
        with:
          target: ${{ matrix.target }}

  display-results:
    runs-on: ubuntu-latest
    name: Display results
    if: github.event_name == 'pull_request'
    needs:
      - run-analysis
    outputs:
      has-critical: ${{ steps.code-analysis.outcome == 'failure' }}
    steps:
      - name: Results
        id: code-analysis
        continue-on-error: true
        uses: lacework/code-security-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  open-issue-on-critical:
    runs-on: ubuntu-latest
    name: Open issue for critical CVEs
    needs:
      - display-results
    if: ${{ needs.display-results.result == 'success' && needs.display-results.outputs.has-critical == 'true' }}
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const prLine = context.payload.pull_request
              ? `**PR:** #${context.payload.pull_request.number}\n` : '';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Critical CVE(s) detected in ${sha}`,
              body: [
                '## Critical CVEs Detected',
                '',
                `Critical CVE(s) were identified by Lacework in commit \`${context.sha}\`.`,
                '',
                `**Workflow run:** ${runUrl}`,
                prLine,
                'Please review and remediate before merging.',
              ].join('\n'),
            });
