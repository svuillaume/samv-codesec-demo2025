on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  LW_ACCOUNT_NAME: ${{ secrets.LW_ACCOUNT_NAME }}
  LW_API_KEY: ${{ secrets.LW_API_KEY }}
  LW_API_SECRET: ${{ secrets.LW_API_SECRET }}

name: Lacework Code Security

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    name: Run analysis
    outputs:
      has-critical: ${{ steps.check.outputs.has-critical }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Analyze
        uses: lacework/code-security-action@v1
        with:
          target: new
      - name: Download results artifact
        uses: actions/download-artifact@v4
        with:
          name: results-new
          path: lw-results
      - name: Check for critical CVEs
        id: check
        run: |
          RESULTS=$(find lw-results -type f | head -1)
          CRITICAL=$(jq '[.. | objects | select(
            (.level? == "error") or
            ((.properties?.severity? // .severity?) | ascii_downcase? == "critical")
          )] | length' "$RESULTS" 2>/dev/null || echo "0")
          echo "Found critical CVE count: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "has-critical=true" >> $GITHUB_OUTPUT
          fi

  open-issue-on-critical:
    runs-on: ubuntu-latest
    name: Open issue for critical CVEs
    needs:
      - run-analysis
    if: always() && needs.run-analysis.outputs.has-critical == 'true'
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Critical CVE(s) detected in ${sha}`,
              body: [
                '## Critical CVEs Detected',
                '',
                `Critical CVE(s) were identified by Lacework in commit \`${context.sha}\`.`,
                '',
                `**Workflow run:** ${runUrl}`,
                '',
                'Please review and remediate.',
              ].join('\n'),
            });
